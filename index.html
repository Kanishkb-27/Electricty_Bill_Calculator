<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <h1>Electricity Bill Estimater</h1>
    <p>Enter you monthly units to find your bill</p>
    <form action="/calculate" method="POST">
        <label>Units Consumed</label>
        <input type="number" name="units" placeholder="ex-150" required>
        <button type="submit">Calculate</button>
    </form>
    {% if bill %}
    <div class="result">
        <h2>Units Used: {{units}} kwh</h2>
        <h2>Total Bill: Rs {{bill}}</h2>
        <p>{{ message}}</p>
    </div>
    {% endif %}
</body>
</html>
